name: demo-pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            demo/package-lock.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install root dependencies
        run: npm ci

      - name: Build package dist
        run: npm run build

      - name: Install demo dependencies
        run: npm --prefix demo install

      - name: Sync built runtime into demo public assets
        run: npm run demo:sync-runtime

      - name: Build demo
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm --prefix demo run build

      - name: Run demo verification
        env:
          VITE_BASE_PATH: /${{ github.event.repository.name }}/
        run: npm --prefix demo run test

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: demo/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4